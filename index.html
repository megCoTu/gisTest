<!DOCTYPE html>
<html>
<head>
  <title>Chicago Crime Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  


  <style>
    #map { height: 100vh; }
    body { margin: 0; }
   
  </style>
</head>

<body>
<div id="map"></div>

<script>

// ======================
// MAP
// ======================

var map = L.map('map').setView([41.8781, -87.6298], 11);


// ======================
// BASEMAPS
// ======================

var light = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© OpenStreetMap © CARTO'
  }
);

var dark = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© OpenStreetMap © CARTO'
  }
);

// DEFAULT MAP
light.addTo(map);


// ======================
// DISTRICT OUTLINES
// ======================

fetch('./Boundaries_-_Community_Areas_20260510.geojson')
  .then(res => res.json())
  .then(data => {

    L.geoJSON(data, {
      style: {
        color: "#666",
        weight: 0.4,
        fillOpacity: 0.1
      }
    }).addTo(map);

  });


// ======================
// LOAD CRIME DATA
// ======================

fetch('./chicago_crime_export.geojson')
  .then(res => res.json())
  .then(data => {

    // ------------------
    // CRIME POINTS
    // ------------------

    var crimeLayer = L.geoJSON(data, {

      pointToLayer: function(feature, latlng) {

        return L.circleMarker(latlng, {

          radius: 5,
          color: "#2b8cbe",
          weight: 1,
          fillOpacity: 0.6

        });

      },

      onEachFeature: function(feature, layer) {

        layer.bindTooltip(
          feature.properties.Date,
          {
            sticky: true,
            direction: "top",
            opacity: 0.9
          }
        );

      }

    });

    // SHOW POINTS BY DEFAULT
    crimeLayer.addTo(map);


    // ------------------
    // HEATMAP
    // ------------------

    var heatPoints = [];

    data.features.forEach(function(feature) {

      var coords = feature.geometry.coordinates;

      heatPoints.push([
        coords[1],
        coords[0],
        1
      ]);

    });

    var heatLayer = L.heatLayer(heatPoints, {

      radius: 25,
      blur: 20,
      maxZoom: 14

    });


    // ======================
    // LAYER CONTROLS
    // ======================

    var baseMaps = {
      "Light": light,
      "Dark": dark
    };

    var overlays = {
      "Crime Points": crimeLayer,
      "Heatmap": heatLayer
    };

    L.control.layers(baseMaps, overlays, {
      collapsed: false
    }).addTo(map);

  });

</script>
</body>
</html>
